name = "prim-parser"
version = "0.1.0"
defaultTargets = ["PrimParser"]

[leanOptions]
pp.unicode.fun = true
pp.fieldNotation = false
autoImplicit = false

[[lean_lib]]
name = "PrimParser"

[[lean_lib]]
name = "Examples"

[[lean_lib]]
name = "Tests"

# Benchmark harness; not in defaultTargets, so normal builds skip it.
[[lean_exe]]
name = "bench"
srcDir = "bench"
root = "Bench"

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.28.0"
